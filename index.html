<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои растения — садовый помощник</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e9f3e6 0%, #d4e2cd 100%);
            min-height: 100vh;
            padding: 1.5rem 1rem 2rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255,255,240,0.7);
            backdrop-filter: blur(4px);
            padding: 1rem 1.8rem;
            border-radius: 56px;
            box-shadow: 0 6px 14px rgba(0,20,0,0.1);
        }

        .title-section h1 {
            font-size: 1.9rem;
            color: #1e3a2f;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-section h1 i {
            font-size: 2rem;
            color: #2b6e4f;
        }

        .plant-counter {
            background: #2b6e4f;
            padding: 6px 16px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: inset 0 -1px 0 #1f543d, 0 4px 8px rgba(0,0,0,0.05);
        }

        /* форма добавления */
        .add-card {
            background: #fefcf0;
            border-radius: 32px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            transition: all 0.2s;
            border: 1px solid #dde9d7;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-group {
            flex: 2;
            min-width: 160px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2d5a44;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1.5px solid #cbdcc2;
            background: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #3a9b6e;
            box-shadow: 0 0 0 3px rgba(58,155,110,0.2);
        }

        .btn-add {
            background: #2b6e4f;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .btn-add:hover {
            background: #1f543d;
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* сетка растений */
        .plants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.6rem;
        }

        /* карточка */
        .plant-card {
            background: white;
            border-radius: 36px;
            padding: 1.2rem 1.5rem 1.5rem 1.5rem;
            transition: transform 0.15s ease, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2efdb;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .plant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
        }

        .plant-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
            border-bottom: 2px dashed #cde2c4;
            padding-bottom: 0.7rem;
        }

        .plant-emoji {
            font-size: 2.5rem;
            background: #eef7ea;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }

        .plant-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e3a2f;
            letter-spacing: -0.3px;
            word-break: break-word;
            flex: 1;
        }

        .plant-details {
            margin: 0.8rem 0;
            background: #f9fbf6;
            border-radius: 28px;
            padding: 12px 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .detail-label {
            font-weight: 600;
            color: #487a5f;
        }

        .detail-value {
            font-weight: 500;
            color: #1a3e31;
        }

        .watering-status {
            margin: 12px 0 8px;
            padding: 10px 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            background: #f2f8ef;
        }

        .status-urgent {
            background: #ffe4db;
            color: #c73e1d;
            border-left: 4px solid #e55a2c;
        }

        .status-today {
            background: #fff0cf;
            color: #b16e0a;
        }

        .status-future {
            background: #e1f3e8;
            color: #1f6e4a;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .btn-water {
            background: #3a9b6e;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-water:hover { background: #2e8259; transform: scale(0.96);}

        .btn-edit {
            background: #eef2e9;
            color: #3c5e4b;
            border: 1px solid #cfdfc7;
        }
        .btn-edit:hover { background: #e2ebdb;}

        .btn-delete {
            background: #ffe5e2;
            color: #bc4e2c;
            border: 1px solid #f5cfc5;
        }
        .btn-delete:hover { background: #ffd6cf; color: #9a3718;}

        .empty-message {
            text-align: center;
            grid-column: 1 / -1;
            background: #fef8e7;
            padding: 3rem;
            border-radius: 64px;
            color: #5e7b5a;
            font-size: 1.2rem;
        }

        .footer-actions {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
        }

        .btn-clear {
            background: rgba(90, 70, 50, 0.1);
            border: 1px solid #aabb9b;
            color: #5a6e4a;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-clear:hover {
            background: rgba(170, 100, 60, 0.2);
            color: #864a2c;
        }

        @media (max-width: 550px) {
            .header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .plant-name {
                font-size: 1.3rem;
            }
            .btn-icon {
                padding: 6px 8px;
                font-size: 0.8rem;
            }
            .button-group {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title-section">
            <h1>
                <i class="fas fa-seedling"></i> 
                Мои растения
            </h1>
        </div>
        <div class="plant-counter" id="plantCounter">
            <i class="fas fa-leaf"></i> <span id="counterValue">0</span> растений
        </div>
    </div>

    <div class="add-card">
        <div class="form-row">
            <div class="input-group">
                <label><i class="fas fa-tag"></i> Название</label>
                <input type="text" id="plantNameInput" placeholder="Напр. Монстера, Фикус..." autocomplete="off">
            </div>
            <div class="input-group">
                <label><i class="fas fa-calendar-alt"></i> Интервал полива (дни)</label>
                <input type="number" id="plantIntervalInput" placeholder="3" value="3" step="1" min="1">
            </div>
            <button class="btn-add" id="addPlantBtn">
                <i class="fas fa-plus-circle"></i> Добавить
            </button>
        </div>
    </div>

    <div class="plants-grid" id="plantsGrid">
        <!-- карточки будут рендериться сюда -->
        <div class="empty-message">
            <i class="fas fa-potted-plant" style="font-size: 2.5rem; opacity: 0.6;"></i>
            <p style="margin-top: 12px;">У вас пока нет растений.<br>Нажмите «Добавить», чтобы начать уход 🌿</p>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-clear" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Очистить все данные</button>
    </div>
</div>

<script>
    // ---------- Утилиты для работы с датами (UTC полночь, сравнение только дней) ----------
    function toUTCMidnight(date) {
        // Возвращает дату с временем 00:00:00 UTC
        return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
    }

    function getTodayUTC() {
        const now = new Date();
        return toUTCMidnight(now);
    }

    // Разница в днях (целое, положительное если date2 > date1)
    function diffDays(date1, date2) {
        const d1 = toUTCMidnight(date1);
        const d2 = toUTCMidnight(date2);
        const diffTime = d2 - d1;
        return Math.round(diffTime / (1000 * 60 * 60 * 24));
    }

    // Получить дату следующего полива (объект Date) на основе lastWatered и интервала
    function getNextWateringDate(lastWateredISO, intervalDays) {
        const lastDate = new Date(lastWateredISO);
        const lastMidnight = toUTCMidnight(lastDate);
        const nextDate = new Date(lastMidnight);
        nextDate.setUTCDate(nextDate.getUTCDate() + intervalDays);
        return nextDate;
    }

    // Форматирование даты в локальный вид (день.месяц.год)
    function formatDate(isoString) {
        if (!isoString) return '—';
        const date = new Date(isoString);
        return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // -------- Модель данных и localStorage --------
    let plants = [];   // каждый элемент: { id, name, wateringInterval, lastWatered }

    const STORAGE_KEY = 'myPlantsApp';

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(plants));
    }

    function loadFromLocalStorage() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            plants = JSON.parse(data);
            // валидация: убедимся, что каждое растение имеет обязательные поля
            plants = plants.filter(p => p && typeof p.id === 'number' && p.name && typeof p.wateringInterval === 'number' && p.lastWatered);
        } else {
            // Стартовые примеры для демонстрации (если нет сохранённых)
            plants = [
                {
                    id: Date.now() + 101,
                    name: "Монстера",
                    wateringInterval: 5,
                    lastWatered: getTodayUTC().toISOString()
                },
                {
                    id: Date.now() + 102,
                    name: "Суккулент",
                    wateringInterval: 10,
                    lastWatered: new Date(Date.now() - 8 * 86400000).toISOString() // полито 8 дней назад
                },
                {
                    id: Date.now() + 103,
                    name: "Базилик",
                    wateringInterval: 2,
                    lastWatered: getTodayUTC().toISOString()
                }
            ];
            saveToLocalStorage();
        }
    }

    // -------- Вспомогательные функции для UI --------
    function updateCounter() {
        const count = plants.length;
        document.getElementById('counterValue').innerText = count;
    }

    // получить статус и класс для стилизации
    function getWateringStatusInfo(plant) {
        const today = getTodayUTC();
        const nextWatering = getNextWateringDate(plant.lastWatered, plant.wateringInterval);
        const daysUntil = diffDays(today, nextWatering);
        
        if (daysUntil < 0) {
            return { text: `🔴 Просрочено на ${-daysUntil} дн.`, className: 'status-urgent', urgent: true };
        } else if (daysUntil === 0) {
            return { text: `💧 ПОЛИВ СЕГОДНЯ!`, className: 'status-today', urgent: true };
        } else if (daysUntil === 1) {
            return { text: `⏳ Завтра полив!`, className: 'status-today', urgent: false };
        } else {
            return { text: `🌱 След. полив через ${daysUntil} дн.`, className: 'status-future', urgent: false };
        }
    }

    // Рендеринг всей сетки
    function renderPlants() {
        const grid = document.getElementById('plantsGrid');
        if (!grid) return;
        
        if (plants.length === 0) {
            grid.innerHTML = `<div class="empty-message">
                <i class="fas fa-potted-plant" style="font-size: 2.5rem; opacity: 0.6;"></i>
                <p style="margin-top: 12px;">У вас пока нет растений.<br>Нажмите «Добавить», чтобы начать уход 🌿</p>
            </div>`;
            updateCounter();
            return;
        }

        let html = '';
        for (let plant of plants) {
            const nextWaterDate = getNextWateringDate(plant.lastWatered, plant.wateringInterval);
            const status = getWateringStatusInfo(plant);
            
            // следующая дата полива для отображения
            const nextWaterFormatted = formatDate(nextWaterDate.toISOString());
            const lastWaterFormatted = formatDate(plant.lastWatered);
            
            html += `
                <div class="plant-card" data-id="${plant.id}">
                    <div class="plant-header">
                        <div class="plant-emoji">🌿</div>
                        <div class="plant-name">${escapeHtml(plant.name)}</div>
                    </div>
                    <div class="plant-details">
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-tint"></i> Интервал:</span>
                            <span class="detail-value">каждые ${plant.wateringInterval} дн.</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-calendar-check"></i> Последний полив:</span>
                            <span class="detail-value">${lastWaterFormatted}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-forward"></i> Следующий полив:</span>
                            <span class="detail-value">${nextWaterFormatted}</span>
                        </div>
                    </div>
                    <div class="watering-status ${status.className}">
                        <i class="fas ${status.urgent ? 'fa-exclamation-triangle' : 'fa-water'}"></i> ${status.text}
                    </div>
                    <div class="button-group">
                        <button class="btn-icon btn-water" data-action="water" data-id="${plant.id}">
                            <i class="fas fa-hand-holding-droplet"></i> Полил
                        </button>
                        <button class="btn-icon btn-edit" data-action="edit" data-id="${plant.id}">
                            <i class="fas fa-pen"></i> Правка
                        </button>
                        <button class="btn-icon btn-delete" data-action="delete" data-id="${plant.id}">
                            <i class="fas fa-trash-can"></i> Удалить
                        </button>
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
        updateCounter();
        
        // Привязываем события на кнопки (делегирование через grid)
        attachCardEvents();
    }

    // Эскейп для защиты от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // делегирование событий карточек (т.к. динамика)
    function attachCardEvents() {
        const grid = document.getElementById('plantsGrid');
        if (!grid) return;
        
        // удаляем старые слушатели, чтобы не дублировать, но можно использовать один глобальный слушатель на родителе
        // Лучше один раз навесить на grid (уже есть ниже в init, но при повторных рендерах не нужно навешивать повторно, т.к. слушатель уже есть)
        // Однако чтобы избежать множества обработчиков — используем глобальный слушатель на документе или grid. Создадим единый обработчик в init.
        // Но так как мы каждый раз вызываем attachCardEvents, а слушатель уже навешан - надо просто не навешивать лишний раз.
        // Вместо этого мы навесим один раз навсегда на document.body или grid. Сделаем в инициализации.
        // Чтобы не плодить дубли, просто удаляем старые? Лучше: обработчик будет один в window.onload. А здесь не будем навешивать заново.
        // Однако при первом рендере обработчик уже будет. Поэтому просто пустая функция.
        // Для чистоты: убираем повторное добавление.
    }

    // -------- Бизнес-логика --------
    function addPlant(name, intervalDays) {
        if (!name || name.trim() === '') {
            alert('Введите название растения 🌱');
            return false;
        }
        const interval = parseInt(intervalDays, 10);
        if (isNaN(interval) || interval < 1) {
            alert('Интервал полива должен быть положительным числом (минимум 1 день)');
            return false;
        }
        const newPlant = {
            id: Date.now() + Math.floor(Math.random() * 10000),
            name: name.trim(),
            wateringInterval: interval,
            lastWatered: getTodayUTC().toISOString()   // полито сегодня при добавлении
        };
        plants.push(newPlant);
        saveToLocalStorage();
        renderPlants();
        return true;
    }

    function waterPlant(plantId) {
        const index = plants.findIndex(p => p.id === plantId);
        if (index === -1) return;
        // обновляем дату последнего полива на сегодня
        plants[index].lastWatered = getTodayUTC().toISOString();
        saveToLocalStorage();
        renderPlants();
        // лёгкое уведомление
        const plantName = plants[index].name;
        showTemporaryMessage(`✅ ${plantName} полит(а)!`);
    }

    function editPlant(plantId) {
        const plant = plants.find(p => p.id === plantId);
        if (!plant) return;
        
        const newName = prompt(`Редактирование растения\nВведите новое название:`, plant.name);
        if (newName === null) return; // отмена
        let newInterval = prompt(`Интервал полива (в днях):`, plant.wateringInterval);
        if (newInterval === null) return;
        
        const intervalNum = parseInt(newInterval, 10);
        if (newName.trim() === '') {
            alert('Название не может быть пустым');
            return;
        }
        if (isNaN(intervalNum) || intervalNum < 1) {
            alert('Интервал должен быть числом больше 0');
            return;
        }
        
        plant.name = newName.trim();
        plant.wateringInterval = intervalNum;
        // lastWatered не меняем
        saveToLocalStorage();
        renderPlants();
        showTemporaryMessage(`✏️ Растение "${plant.name}" обновлено`);
    }
    
    function deletePlant(plantId) {
        const plant = plants.find(p => p.id === plantId);
        if (!plant) return;
        if (confirm(`Удалить "${plant.name}" из коллекции?`)) {
            plants = plants.filter(p => p.id !== plantId);
            saveToLocalStorage();
            renderPlants();
            showTemporaryMessage(`🗑️ Растение удалено`);
        }
    }
    
    function clearAllData() {
        if (confirm('ВНИМАНИЕ! Это удалит ВСЕ растения и сбросит данные. Продолжить?')) {
            plants = [];
            saveToLocalStorage();
            renderPlants();
            showTemporaryMessage(`♻️ Все данные очищены`);
        }
    }

    // небольшой тост / уведомление
    let toastTimeout = null;
    function showTemporaryMessage(msg) {
        let toast = document.getElementById('dynamicToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#1e3a2f';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '60px';
            toast.style.fontWeight = '500';
            toast.style.zIndex = '999';
            toast.style.boxShadow = '0 8px 20px rgba(0,0,0,0.2)';
            toast.style.backdropFilter = 'blur(4px)';
            toast.style.fontSize = '0.9rem';
            toast.style.pointerEvents = 'none';
            document.body.appendChild(toast);
        }
        if (toastTimeout) clearTimeout(toastTimeout);
        toast.textContent = msg;
        toast.style.opacity = '1';
        toastTimeout = setTimeout(() => {
            toast.style.opacity = '0';
        }, 2000);
    }

    // -------- Обработчик глобальных событий (клики по кнопкам в карточках) --------
    function globalClickHandler(e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        e.preventDefault();
        const action = btn.getAttribute('data-action');
        const idStr = btn.getAttribute('data-id');
        if (!idStr) return;
        const plantId = parseInt(idStr, 10);
        
        switch(action) {
            case 'water':
                waterPlant(plantId);
                break;
            case 'edit':
                editPlant(plantId);
                break;
            case 'delete':
                deletePlant(plantId);
                break;
            default: break;
        }
    }

    // -------- Инициализация --------
    function init() {
        loadFromLocalStorage();
        renderPlants();
        
        // обработчик добавления
        const addBtn = document.getElementById('addPlantBtn');
        const nameInput = document.getElementById('plantNameInput');
        const intervalInput = document.getElementById('plantIntervalInput');
        
        addBtn.addEventListener('click', () => {
            const name = nameInput.value;
            const interval = intervalInput.value;
            if (addPlant(name, interval)) {
                nameInput.value = '';
                intervalInput.value = '3';
                nameInput.focus();
            }
        });
        
        // добавим по Enter в поле имени
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addBtn.click();
            }
        });
        
        // очистка всех
        const clearBtn = document.getElementById('clearAllBtn');
        if (clearBtn) clearBtn.addEventListener('click', clearAllData);
        
        // глобальный обработчик для карточек (делегирование)
        document.body.addEventListener('click', globalClickHandler);
    }

    // запуск после полной загрузки DOM
    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
